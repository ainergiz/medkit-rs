name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  preflight-tests:
    name: Release preflight tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: astral-sh/setup-uv@v5
      - uses: Swatinem/rust-cache@v2
      - name: Sync package
        run: uv sync --dev
      - name: Check Rust formatting
        run: cargo fmt --all --check
      - name: Run Clippy
        run: cargo clippy --workspace --all-targets --locked -- -D warnings
      - name: Run workspace tests
        run: cargo test --workspace --locked --exclude medkit-python
      - name: Run medkit-python Rust tests
        run: |
          python scripts/run_medkit_python_rust_tests.py
      - name: Check public Python API contract
        run: uv run python scripts/check_python_api.py
      - name: Compile Python files
        run: uv run python -m compileall python tests scripts examples crates/medkit-benchmarks/scripts
      - name: Run Python API tests
        run: uv run pytest tests/python -q

  build-wheels:
    name: Wheel ${{ matrix.os }} ${{ matrix.target }}
    needs:
      - preflight-tests
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64
          - os: macos-15-intel
            target: x86_64
          - os: macos-14
            target: aarch64
          - os: windows-latest
            target: x64
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: dtolnay/rust-toolchain@stable
      - name: Check tag matches package version
        shell: bash
        run: |
          python - <<'PY'
          import os
          import pathlib
          import tomllib

          tag = os.environ.get("GITHUB_REF_NAME", "")
          if tag.startswith("v"):
              expected = tag[1:]
              actual = tomllib.loads(pathlib.Path("pyproject.toml").read_text())["project"]["version"]
              if actual != expected:
                  raise SystemExit(f"tag {tag} does not match pyproject version {actual}")
          PY
      - uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          args: --release --locked --out dist
          sccache: "true"
          manylinux: auto
      - name: Smoke install wheel
        shell: bash
        run: |
          python -m pip install --upgrade pip
          python -m pip install dist/*.whl
          python - <<'PY'
          import medkit_rs

          assert medkit_rs.__version__ == "0.1.0"
          assert hasattr(medkit_rs, "cxr")
          PY
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}-${{ matrix.target }}
          path: dist/*.whl

  build-sdist:
    name: Source distribution
    needs:
      - preflight-tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: dtolnay/rust-toolchain@stable
      - name: Build sdist
        run: |
          python -m pip install --upgrade pip
          python -m pip install "maturin>=1.7,<2"
          maturin sdist --out dist
      - uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz

  publish:
    name: Publish to PyPI
    needs:
      - preflight-tests
      - build-wheels
      - build-sdist
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: "*"
          merge-multiple: true
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Check distributions
        run: |
          python -m pip install --upgrade pip
          python -m pip install twine
          twine check dist/*
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
