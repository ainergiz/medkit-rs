name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  rust-tests:
    name: Rust tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: astral-sh/setup-uv@v5
      - uses: Swatinem/rust-cache@v2
      - name: Check Rust formatting
        run: cargo fmt --all --check
      - name: Run Clippy
        run: cargo clippy --workspace --all-targets --locked -- -D warnings
      - name: Run workspace tests
        run: cargo test --workspace --locked --exclude medkit-python
      - name: Run medkit-python Rust tests
        run: |
          python scripts/run_medkit_python_rust_tests.py

  python-contract:
    name: Python import and API contract
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: astral-sh/setup-uv@v5
      - uses: Swatinem/rust-cache@v2
      - name: Sync package
        run: |
          uv sync --dev
      - name: Check public Python API contract
        run: |
          uv run python scripts/check_python_api.py
      - name: Compile Python files
        run: |
          uv run python - <<'PY'
          from pathlib import Path
          import py_compile

          roots = [
              Path("python"),
              Path("scripts"),
              Path("examples"),
              Path("crates/medkit-benchmarks/scripts"),
          ]
          paths = sorted(
              path
              for root in roots
              if root.exists()
              for path in root.rglob("*.py")
          )
          for path in paths:
              py_compile.compile(str(path), doraise=True)
          print(f"compiled {len(paths)} Python files")
          PY
      - name: Run Python API tests
        run: |
          uv run pytest tests/python -q
